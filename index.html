<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Static Carousel Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: black;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .carousel {
      position: relative;
      width: 1500px;
      max-width: 90vw;
      /* aspect-ratio: 16 / 9; --TODO Test if needed */
      overflow: hidden;
      border-radius: 12px;
    }

    .slides {
      display: flex;
      /*width: 200%;
      height: 100%; */
      animation: slideShow 10s infinite;
    }

    .slide {
      width: 100%;
      flex-shrink: 0;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @keyframes slideShow {
      0%, 45% {
        transform: translateX(0);
      }

      50%, 95% {
        transform: translateX(-50%);
      }

      100% {
        transform: translateX(0);
      }
    }
  </style>
</head>
<body>

  <div class="carousel">
    <div class="slides">
      <div class="slide">
        <img src="imgs/1.webp" alt="First image">
      </div>

      <div class="slide">
        <img src="imgs/2.webp" alt="Second image">
      </div>
    </div>
  </div>

</body>
</html>
