<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vampire Scroll Carousel</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: black;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden; /* prevents page scroll */
  }

  /* 80vh SCROLL AREA */
  .carousel-wrapper {
    height: 80vh;
    overflow-x: auto;
    overflow-y: hidden;
    display: flex;
    align-items: center;
    scroll-snap-type: x mandatory; /* optional but nice */
  }

  /* each image container */
  .slide {
    flex: 0 0 auto;
    height: 100%;
    scroll-snap-align: start; /* optional */
  }

  .slide img {
    height: 100%;
    width: auto; /* keeps 1500px natural width */
    display: block;
  }

  /* 10vh BUTTON AREA */
  .buttons {
    height: 20vh;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;

    background: black;
    border-top: 1px solid rgba(120, 0, 0, 0.25);
  }

  .buttons button {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: 1px solid rgba(180, 0, 0, 0.6);

    background: radial-gradient(circle at top,
      rgba(140, 0, 0, 0.95),
      rgba(55, 0, 0, 0.98));

    color: #f5d0d0;
    font-size: 1.8rem;
    cursor: pointer;

    box-shadow:
      0 0 12px rgba(120, 0, 0, 0.6),
      inset 0 0 10px rgba(255, 80, 80, 0.15);
  }
</style>
</head>

<body>

  <!-- 90vh horizontal scroll area -->
  <div class="carousel-wrapper" id="carousel">
    <div class="slide">
      <img src="imgs/1.webp" alt="Image 1">
    </div>

    <div class="slide">
      <img src="imgs/2.webp" alt="Image 2">
    </div>
  </div>

  <!-- 10vh controls -->
  <div class="buttons">
    <button onclick="scrollPrev()">❮</button>
    <button onclick="scrollNext()">❯</button>
  </div>

<script>
  const carousel = document.getElementById("carousel");
  const slides = document.querySelectorAll(".slide");

  function scrollToIndex(i) {
    const slide = slides[i];
    carousel.scrollTo({
      left: slide.offsetLeft,
      behavior: "smooth"
    });
  }

  function scrollNext() {
    const width = slides.length;
    const current = Math.round(carousel.scrollLeft / carousel.clientWidth);
    const next = (current + 1) % width;
    scrollToIndex(next);
  }

  function scrollPrev() {
    const width = slides.length;
    const current = Math.round(carousel.scrollLeft / carousel.clientWidth);
    const prev = (current - 1 + width) % width;
    scrollToIndex(prev);
  }
</script>

</body>
</html>
