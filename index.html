<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vampire Carousel</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: black;
      overflow-x: hidden;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
    }

    .carousel-wrapper {
      height: 90vh;
      overflow-x: auto; /* enables horizontal scroll */
      overflow-y: hidden;
      white-space: nowrap; /* prevents line wrapping if multiple slides inline */
      display: flex;
      justify-content: flex-start;
      align-items: center;
      position: relative;
    }

    .carousel {
      display: flex;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.8s ease-in-out;
    }

    .slide.active {
      opacity: 1;
      z-index: 1;
    }

    .slide img {
      height: 100%; /* scale to 90vh */
      width: auto;  /* keep original width, may exceed viewport */
      display: block;
    }

    .buttons {
      /*
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      transform: translateY(-50%);
      padding: 0 16px;
      z-index: 2;
      */
      height: 10vh;

      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .buttons button {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 1px solid rgba(180, 0, 0, 0.6);

      background:
        radial-gradient(circle at top,
          rgba(140, 0, 0, 0.95),
          rgba(55, 0, 0, 0.98));

      color: #f5d0d0;
      font-size: 1.8rem;
      cursor: pointer;

      box-shadow:
        0 0 12px rgba(120, 0, 0, 0.6),
        inset 0 0 10px rgba(255, 80, 80, 0.15);

      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        background 0.2s ease;
    }

    .buttons button:hover {
      transform: scale(1.08);

      background:
        radial-gradient(circle at top,
          rgba(180, 0, 0, 1),
          rgba(75, 0, 0, 1));

      box-shadow:
        0 0 20px rgba(180, 0, 0, 0.8),
        inset 0 0 14px rgba(255, 120, 120, 0.2);
    }

    .buttons button:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>

  <div class="carousel">

    <div class="slide active">
      <img src="imgs/1.webp" alt="First image">
    </div>

    <div class="slide">
      <img src="imgs/2.webp" alt="Second image">
    </div>

    <div class="buttons">
      <button onclick="prevSlide()">❮</button>
      <button onclick="nextSlide()">❯</button>
    </div>

  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    let index = 0;

    function showSlide(i) {
      slides.forEach((slide, idx) => {
        slide.classList.toggle('active', idx === i);
      });
    }

    function nextSlide() {
      index = (index + 1) % slides.length;
      showSlide(index);
    }

    function prevSlide() {
      index = (index - 1 + slides.length) % slides.length;
      showSlide(index);
    }
  </script>

</body>
</html>
